<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS1 Technical Drawing - ArchyClass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E85A2A;
            --bg: #0A0A0B;
            --card: #111113;
            --text: #F5F5F5;
            --text-muted: #A1A1AA;
            --border: #27272A;
        }
        * {margin:0;padding:0;box-sizing:border-box}
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
        }
        .container {max-width: 1200px; margin: 0 auto;}
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
        }
        .back-btn:hover {color: var(--primary);}
        .header {
            text-align: center;
            margin-bottom: 60px;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FFFFFF 0%, #A1A1AA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .highlight {color: var(--primary); -webkit-text-fill-color: var(--primary);}
        .subtitle {color: var(--text-muted); font-size: 1.1rem;}
        .terms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }
        .term {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            position: relative;
            overflow: hidden;
        }
        .term::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #FFB800);
        }
        .term h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: var(--primary);
        }
        .week-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            margin: 10px 0;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
        }
        .week-link:hover {
            background: rgba(255,107,53,0.1);
            border-color: var(--primary);
            transform: translateX(8px);
        }
        .week-info {flex: 1;}
        .week-num {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.85rem;
            display: block;
            margin-bottom: 4px;
        }
        .week-title {font-weight: 500;}
        .arrow {color: var(--text-muted); transition: 0.2s;}
        .week-link:hover .arrow {color: var(--primary); transform: translateX(4px);}
        .cta {
            text-align: center;
            padding: 40px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 20px rgba(255,107,53,0.4);
            transition: 0.3s;
        }
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255,107,53,0.5);
        }
        footer {
            text-align: center;
            padding: 40px 20px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>

        </nav>
